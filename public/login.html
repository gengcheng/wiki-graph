<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>登录 · LLM Wiki</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
      --text: #e2e8f0; --muted: #64748b; --accent: #4e9af1;
    }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    .card {
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon { font-size: 22px; color: var(--accent); }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: default; }
    .error {
      margin-top: 14px;
      font-size: 13px;
      color: #f87171;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">LLM Wiki</span>
    </div>
    <form id="form">
      <label for="username">用户名</label>
      <input id="username" type="text" autocomplete="username" autofocus>
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="current-password">
      <button id="btn" type="submit">登录</button>
    </form>
    <div class="error" id="err"></div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault()
      const btn = document.getElementById('btn')
      const err = document.getElementById('err')
      btn.disabled = true
      err.textContent = ''
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        })
        if (res.ok) {
          location.href = '/'
        } else {
          const data = await res.json().catch(() => ({}))
          err.textContent = data.error || '登录失败'
          btn.disabled = false
        }
      } catch {
        err.textContent = '网络错误，请重试'
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
