<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Wiki</title>
  <script src="d3.v7.min.js"></script>
  <script src="marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Left Menu -->
  <nav id="left-menu">
    <div id="menu-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">LLM Wiki</span>
    </div>
    <div id="menu-items">
      <button class="menu-item active" data-view="query">
        <span class="menu-icon">✦</span>
        <span class="menu-label">智能问答</span>
      </button>
      <button class="menu-item" data-view="graph">
        <span class="menu-icon">⬡</span>
        <span class="menu-label">知识图谱</span>
      </button>
      <button class="menu-item" data-view="files">
        <span class="menu-icon">◫</span>
        <span class="menu-label">文件浏览</span>
      </button>
      <button class="menu-item" data-view="tags">
        <span class="menu-icon">#</span>
        <span class="menu-label">标签</span>
      </button>
      <button class="menu-item" data-view="ingest">
        <span class="menu-icon">↓</span>
        <span class="menu-label">摄入</span>
      </button>
      <button class="menu-item" data-view="lint">
        <span class="menu-icon">✓</span>
        <span class="menu-label">健康检查</span>
      </button>
    </div>
    <div id="menu-footer">
      <div id="kb-stats"></div>
      <button id="logout-btn" onclick="logout()" style="display:none">
        <span class="menu-icon">⎋</span>
        <span class="menu-label">退出登录</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="content">

    <!-- View: Graph -->
    <div id="view-graph" class="view">
      <div id="graph-toolbar">
        <div id="filter-bar">
          <button class="filter active" data-type="all">全部</button>
          <button class="filter" data-type="entity">
            <span class="dot entity"></span>实体
          </button>
          <button class="filter" data-type="concept">
            <span class="dot concept"></span>概念
          </button>
          <button class="filter" data-type="topic">
            <span class="dot topic"></span>主题
          </button>
          <button class="filter" data-type="source">
            <span class="dot source"></span>源
          </button>
        </div>
        <input id="graph-search" type="text" placeholder="搜索节点…" autocomplete="off">
      </div>
      <svg id="graph"></svg>
      <div id="node-panel">
        <div id="node-panel-header">
          <span id="node-type-badge"></span>
          <button id="node-panel-close">✕</button>
        </div>
        <h2 id="node-title"></h2>
        <div id="node-content"></div>
      </div>
      <div id="tooltip"></div>
    </div>

    <!-- View: Query -->
    <div id="view-query" class="view active">
      <div id="query-page-panel">
        <div id="qpp-header">
          <span id="qpp-badge"></span>
          <button id="qpp-close">✕</button>
        </div>
        <h2 id="qpp-title"></h2>
        <div id="qpp-content"></div>
      </div>
      <div id="query-topbar">
        <span id="query-topbar-title">智能问答</span>
        <button id="new-chat-btn">+ 新问答</button>
      </div>
      <div id="query-body">
        <div id="conv-sidebar">
          <div id="conv-sidebar-hd">历史问答</div>
          <div id="conv-list"></div>
        </div>
        <div id="query-main">
          <div id="messages-wrap">
            <div id="messages">
              <div id="query-welcome">
                <div class="welcome-icon">✦</div>
                <h2>向知识库提问</h2>
                <p>基于你的 wiki 内容回答问题</p>
              </div>
            </div>
          </div>
          <div id="query-bar-wrap">
            <div id="query-bar">
              <textarea id="query-input" placeholder="向知识库提问…" rows="1"></textarea>
              <button id="send-btn">
                <span>↑</span>
              </button>
            </div>
            <div id="query-hint">按 Enter 发送 · Shift+Enter 换行</div>
          </div>
        </div>
      </div>
    </div>

    <!-- View: Files -->
    <div id="view-files" class="view">
      <div id="file-page-panel">
        <div id="fpp-header">
          <span id="fpp-badge"></span>
          <button id="fpp-close">✕</button>
        </div>
        <h2 id="fpp-title"></h2>
        <div id="fpp-content"></div>
      </div>
      <div id="files-sidebar">
        <div id="files-search-wrap">
          <input id="files-search" type="text" placeholder="搜索文件…" autocomplete="off">
        </div>
        <div id="files-tree"></div>
      </div>
      <div id="files-content">
        <div id="files-welcome">
          <div class="welcome-icon">◫</div>
          <p>选择左侧文件查看内容</p>
        </div>
        <div id="file-header" style="display:none">
          <span id="file-type-badge"></span>
          <h2 id="file-title"></h2>
        </div>
        <div id="file-body"></div>
      </div>
    </div>

    <!-- View: Tags -->
    <div id="view-tags" class="view">
      <div id="tags-sidebar">
        <div id="tags-sidebar-search-wrap">
          <input id="tags-sidebar-search" type="text" placeholder="搜索标签…" autocomplete="off">
        </div>
        <div id="tags-list"></div>
      </div>
      <div id="tags-main">
        <div id="tags-welcome">
          <div class="welcome-icon">#</div>
          <p>选择左侧标签查看页面</p>
        </div>
        <div id="tags-pages" style="display:none"></div>
      </div>
      <div id="tags-page-panel">
        <div id="tpp-header">
          <span id="tpp-badge"></span>
          <button id="tpp-close">✕</button>
        </div>
        <h2 id="tpp-title"></h2>
        <div id="tpp-content"></div>
      </div>
    </div>

    <!-- View: Ingest -->
    <div id="view-ingest" class="view">
      <div id="ingest-container">

        <!-- Upload card -->
        <div class="ingest-card">
          <div class="ingest-card-hd">
            <div>
              <h2>上传文件</h2>
              <p>上传到 raw/ingest，由定时任务自动处理</p>
            </div>
          </div>
          <div id="drop-zone">
            <div id="drop-icon">↑</div>
            <div id="drop-label">拖拽 .md 文件到此处</div>
            <div id="drop-sub">或 <label id="drop-browse" for="file-input">点击选择文件</label>（支持多选）</div>
            <input type="file" id="file-input" accept=".md,.txt" multiple>
          </div>
          <div id="file-list"></div>
          <div id="tags-row">
            <div class="tags-label">附加标签 <span class="tags-hint">（可选）</span></div>
            <div id="tags-chips-wrap">
              <div id="tags-chips"></div>
              <input type="text" id="tags-input" placeholder="输入标签，回车添加…" autocomplete="off">
            </div>
          </div>
          <button id="ingest-file-btn" disabled>上传文件</button>
          <div id="ingest-log-wrap" style="display:none">
            <div id="ingest-log-header">
              <span id="ingest-log-title">上传结果</span>
            </div>
            <div id="ingest-log"></div>
          </div>
        </div>

        <!-- Status card -->
        <div class="ingest-card">
          <div class="ingest-card-hd">
            <h2>定时任务</h2>
            <button id="run-now-btn">立即处理</button>
          </div>
          <div id="scheduler-info"></div>
          <div id="pending-section" style="display:none">
            <div class="pending-hd">待处理文件</div>
            <div id="pending-list"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- View: Lint -->
    <div id="view-lint" class="view">
      <div id="lint-container">
        <div id="lint-header">
          <div>
            <h2>知识库健康检查</h2>
            <p>检查断链、Frontmatter、孤岛页面和 Ghost 文件</p>
          </div>
          <button id="lint-btn">开始检查</button>
        </div>
        <div id="lint-sched-card">
          <div class="lint-sched-hd">
            <span>定时检查</span>
            <label class="sched-toggle"><input type="checkbox" id="lint-sched-enabled"><span class="sched-toggle-track"></span></label>
          </div>
          <div id="lint-sched-info"></div>
          <div class="lint-sched-row">
            <input id="lint-cron-input" type="text" placeholder="Cron 表达式，如 0 * * * *" autocomplete="off">
            <button id="lint-cron-save">保存</button>
          </div>
        </div>
        <div id="lint-stats" style="display:none">
          <div class="stat-card error">
            <div class="stat-num" id="stat-errors">0</div>
            <div class="stat-label">错误</div>
          </div>
          <div class="stat-card warning">
            <div class="stat-num" id="stat-warnings">0</div>
            <div class="stat-label">警告</div>
          </div>
          <div class="stat-card pass">
            <div class="stat-num" id="stat-checks">0</div>
            <div class="stat-label">通过</div>
          </div>
        </div>
        <div id="lint-results"></div>
      </div>
    </div>

  </main>

  <script src="graph.js"></script>
  <script>
    async function logout() {
      await fetch('/api/logout', { method: 'POST' })
      location.href = '/login'
    }
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.authEnabled) document.getElementById('logout-btn').style.display = 'flex'
    }).catch(() => {})
  </script>
</body>
</html>
